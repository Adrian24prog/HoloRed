# ==============================================================================
# Proyecto: Cuartel General de Inteligencia de la Nueva República
# Archivo: docker-compose.yml
# ==============================================================================

version: '3.8'

services:

  # -----------------------------------------------------------
  # MÓDULO 1: REDIS
  # -----------------------------------------------------------
  redis-republic:
    image: redis:7-alpine
    container_name: redis_radar
    command: redis-server --requirepass "RepublicRadar_2024!" --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped


  # -----------------------------------------------------------
  # MÓDULO 2: CASSANDRA
  # -----------------------------------------------------------
  cassandra-republic:
    image: cassandra:4.1
    container_name: cassandra_telemetria
    ports:
      - "9042:9042"
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    volumes:
      - ./data/cassandra:/var/lib/cassandra
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 20s
      timeout: 10s
      retries: 5


  # -----------------------------------------------------------
  # MÓDULO 3: NEO4J
  # -----------------------------------------------------------
  neo4j-republic:
    image: neo4j:5
    container_name: neo4j_inteligencia
    environment:
      - NEO4J_AUTH=neo4j/RepublicSpies_2026!
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    restart: unless-stopped